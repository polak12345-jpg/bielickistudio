document.addEventListener("keydown", function(e){

if(e.key==="F12"){
e.preventDefault();
}

if(
e.ctrlKey &&
e.shiftKey &&
(
e.key==="I" ||
e.key==="J" ||
e.key==="C"
)
){
e.preventDefault();
}

if(e.ctrlKey && e.key==="U"){
e.preventDefault();
}

});

const images = [...document.querySelectorAll(".gallery img")];

const lightbox = document.getElementById("lightbox");

const lightboxImg = document.getElementById("lightbox-img");

const closeBtn = document.querySelector(".lightbox-close");

const prevBtn = document.querySelector(".lightbox-prev");

const nextBtn = document.querySelector(".lightbox-next");

const counter = document.getElementById("lightbox-counter");


let current = 0;

let activeGallery = images;

let moreCurrent = 0;



// ===== ANIMOWANA ZMIANA ZDJĘCIA =====

function changeLightboxImage(src){

    lightboxImg.src = src;

}




// ===== ZWYKŁA GALERIA =====


function updateCounter(){

    let index;

    if(activeGallery === images){
        index = current;
    } else {
        index = moreCurrent;
    }

    counter.innerHTML = `${index + 1} / ${activeGallery.length}`;

}



function showImage(){

    changeLightboxImage(
        activeGallery[current].src || activeGallery[current]
    );

    updateCounter();

}



images.forEach((img,index)=>{


img.addEventListener("click",()=>{


activeGallery = images;

current = index;


showImage();


lightbox.classList.add("active");


});


});

window.openMoreGallery = function(id){


activeGallery = moreGalleries[id];


moreCurrent = 0;


changeLightboxImage(activeGallery[0]);

updateCounter();


lightbox.classList.add("active");


};






// ===== STRZAŁKI =====


nextBtn.addEventListener("click",(e)=>{


e.stopPropagation();


if(!lightbox.classList.contains("active")) return;



if(activeGallery === images){


current++;


if(current >= activeGallery.length){
current = 0;
}


showImage();



}else{


moreCurrent++;


if(moreCurrent >= activeGallery.length){
moreCurrent = 0;
}


changeLightboxImage(
    activeGallery[moreCurrent]
);

updateCounter();


}



});







prevBtn.addEventListener("click",(e)=>{


e.stopPropagation();


if(!lightbox.classList.contains("active")) return;



if(activeGallery === images){


current--;


if(current < 0){
current = activeGallery.length-1;
}


showImage();



}else{

    moreCurrent--;

    if(moreCurrent < 0){
        moreCurrent = activeGallery.length - 1;
    }

    changeLightboxImage(
        activeGallery[moreCurrent]
    );

    updateCounter();

}


});







// ===== ZAMYKANIE =====


closeBtn.addEventListener("click",()=>{

lightbox.classList.remove("active");

});



lightbox.addEventListener("click",e=>{


if(e.target === lightbox){

lightbox.classList.remove("active");

}


});







// ===== KLAWIATURA =====


document.addEventListener("keydown",e=>{


if(!lightbox.classList.contains("active")) return;



if(e.key==="Escape"){

lightbox.classList.remove("active");

}



if(e.key==="ArrowRight"){

nextBtn.click();

}



if(e.key==="ArrowLeft"){

prevBtn.click();

}



});

});
